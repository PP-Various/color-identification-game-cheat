<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 240px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fcfcfc;
            color: #333333;
            margin: 0;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 16px;
            color: #d1563b; /* 画像の「ゲーム終了！」に近い赤系アクセント */
            border-left: 3px solid #d1563b;
            padding-left: 8px;
            line-height: 1.2;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: bold;
            color: #555555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #ffffff;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #d1563b;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #ffffff;
            border: 1px solid #d1563b;
            border-radius: 6px;
            color: #d1563b;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #d1563b;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <h3>設定</h3>
    <label>最大正解数:</label>
    <input type="number" id="roundInput" value="50">
    <button id="saveBtn">保存</button>
    <script src="popup.js"></script>
</body>

</html>
